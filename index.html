<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

/* 🔥 RICHTIGER FIX */
.poster{
  position:fixed;

  left:0;
  bottom:0;

  width:100vw;   /* 👉 volle Breite */
  height:auto;   /* 👉 KEIN Abschneiden mehr */

  /* 👉 leicht nach oben (dein perfekter Punkt) */
  transform:translateY(-10px);
}
</style>

<body>

<img src="poster.jpg" class="poster">
