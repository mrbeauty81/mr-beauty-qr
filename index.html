<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>MR Beauty</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MR Beauty">
<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="logo.jpg">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  touch-action:manipulation;
  -webkit-user-select:none;
  user-select:none;
}

body{
  position:fixed;
  inset:0;
}

.app{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  height:100dvh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* PRO VERSION:
   Bild wird grösser angezeigt, unten weniger leer,
   aber QR und Rahmen bleiben sichtbar. */
.poster{
  display:block;
  width:auto;
  height:100dvh;
  max-width:none;
  max-height:none;
  object-fit:contain;
  transform:scale(1.075);
  transform-origin:center center;
  animation:fadeIn .45s ease;
}

@supports (height:100svh){
  .app{height:100svh;}
  .poster{height:100svh;}
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(1.045);}
  to{opacity:1; transform:scale(1.075);}
}
</style>
</head>

<body>
  <a class="app" href="https://g.page/r/CQ00ytHxvicAEBM/review" aria-label="MR Beauty Google Bewertung öffnen">
    <img class="poster" src="poster.PNG" alt="MR Beauty QR Code">
  </a>
</body>
</html>
