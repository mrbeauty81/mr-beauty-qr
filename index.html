<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>MR Beauty QR</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MR Beauty">

<link rel="apple-touch-icon" href="logo.jpg">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

/* Container für exakte Position */
.app{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-top:env(safe-area-inset-top);
}

/* Bild exakt darstellen */
.poster{
  width:100vw;
  height:auto;

  /* Feintuning Position */
  transform:translateY(-10px);
}
</style>
</head>

<body>

<div class="app">
  <img src="poster.jpg" class="poster">
</div>

</body>
</html>
