<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>MR Beauty QR</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MR Beauty">
<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="logo.jpg">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

/* Container damit unten NICHT abgeschnitten wird */
.wrap{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding-bottom: env(safe-area-inset-bottom);
}

.poster{
  width:100vw;
  height:auto;

  /* dein perfekter Offset + leicht angepasst damit Rand sichtbar */
  transform:translateY(calc(8mm + 4px));

  object-fit:contain;
  display:block;
}
</style>
</head>

<body>
  <div class="wrap">
    <img class="poster" src="poster.jpg" alt="MR Beauty QR">
  </div>
</body>
</html>
