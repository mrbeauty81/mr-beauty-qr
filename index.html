<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>MR Beauty QR</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MR Beauty">
<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="logo.jpg">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

.app{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:flex-end; /* unten fixiert */
  background:#000;
}

.poster{
  max-width:100vw;
  max-height:100vh;
  object-fit:contain;
  
  /* 🔥 exakt 20px nach unten */
  transform: translateY(20px);
}
</style>
</head>

<body>
  <div class="app">
    <img class="poster" src="poster.jpg" alt="MR Beauty QR">
  </div>
</body>
</html>
