<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>MR Beauty QR</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MR Beauty">
<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="logo.jpg">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

.poster{
  position:fixed;
  left:50%;
  top:50%;

  /* leicht reinzoomen -> Rahmen verschwindet */
  width:104vw;
  height:auto;

  transform:translate(-50%, calc(-50% + 8mm));
  object-fit:cover;
  display:block;
}
</style>
</head>

<body>
  <img class="poster" src="poster.jpg" alt="MR Beauty QR">
</body>
</html>
