<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>MR Beauty</title>

<!-- iPhone App Einstellungen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MR Beauty">
<meta name="theme-color" content="#000000">

<!-- App Icon -->
<link rel="apple-touch-icon" href="logo.jpg">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  touch-action: manipulation;
  -webkit-user-select:none;
  user-select:none;
}

body{
  position:fixed;
  inset:0;
}

.app{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

.poster{
  max-width:100vw;
  max-height:100vh;
  max-height:100dvh;
  object-fit:contain;
}

/* iOS Fix */
@supports (height: 100svh){
  .app{height:100svh;}
  .poster{max-height:100svh;}
}
</style>
</head>

<body>

<!-- GANZER SCREEN = KLICKBAR -->
<a class="app" href="https://g.page/r/CQ00ytHxvicAEBM/review">

  <img class="poster" src="poster.png" alt="MR Beauty QR Code">

</a>

</body>
</html>
